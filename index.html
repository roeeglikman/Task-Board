<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח משימות</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#f2f4f8;
margin:0;
padding:15px;
}

h1{text-align:center}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
margin-bottom:15px;
}

button{
padding:6px 10px;
border:none;
background:#4CAF50;
color:white;
border-radius:5px;
cursor:pointer;
}

.calendar{
display:grid;
gap:8px;
}

.month{grid-template-columns:repeat(7,1fr);}
.week{grid-template-columns:repeat(7,1fr);}
.dayView{grid-template-columns:1fr;}

.day{
background:white;
border-radius:10px;
padding:6px;
min-height:110px;
}

.date{
font-weight:bold;
font-size:13px;
margin-bottom:4px;
}

.task{
display:flex;
align-items:center;
gap:5px;
padding:4px;
margin-top:4px;
border-radius:5px;
font-size:12px;
cursor:pointer;
}

.done{
text-decoration:line-through;
opacity:0.5;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modalContent{
background:white;
padding:15px;
border-radius:10px;
width:260px;
}

.modalContent input,
.modalContent select{
width:100%;
margin-bottom:6px;
padding:5px;
}

.todayBox{
position:fixed;
top:10px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
width:200px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
font-size:12px;
}

.todayBox h3{
margin-top:0;
font-size:14px;
}

</style>

</head>

<body>

<h1 id="label">לוח משימות</h1>

<div class="controls">

<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>

<button onclick="setView('month')">חודש</button>
<button onclick="setView('week')">שבוע</button>
<button onclick="setView('day')">יום</button>

<button onclick="openModal()">➕ משימה</button>

</div>

<div id="calendar" class="calendar"></div>

<div id="todayBox" class="todayBox">
<h3>משימות להיום</h3>
<div id="todayTasks"></div>
</div>

<div class="modal" id="modal">

<div class="modalContent">

<input id="taskText" placeholder="משימה">

<label>שעת התחלה</label>
<select id="start"></select>

<label>שעת סיום</label>
<select id="end"></select>

<label>עדיפות</label>
<select id="priority">
<option>גבוהה</option>
<option>בינונית</option>
<option>נמוכה</option>
</select>

<label>צבע</label>
<select id="color">
<option value="#FFCDD2">אדום</option>
<option value="#FFE0B2">כתום</option>
<option value="#FFF9C4">צהוב</option>
<option value="#C8E6C9">ירוק</option>
<option value="#B3E5FC">תכלת</option>
<option value="#D1C4E9">סגול</option>
<option value="#F8BBD0">ורוד</option>
<option value="#E0E0E0">אפור</option>
<option value="#BBDEFB">כחול</option>
</select>

<button onclick="saveTask()">שמור</button>
<button onclick="closeModal()">ביטול</button>

</div>

</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

let current=new Date();
let view="month";
let selectedDate=null;
let editIndex=null;

const daysHeb=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const months=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function createTimes(){

for(let h=0;h<24;h++){
for(let m=0;m<60;m+=30){

let hh=h.toString().padStart(2,"0");
let mm=m.toString().padStart(2,"0");

let t=hh+":"+mm;

start.add(new Option(t,t));
end.add(new Option(t,t));

}
}

}

function openModal(date=null,index=null){

selectedDate=date;
editIndex=index;

modal.style.display="flex";

if(index!=null){

let task=tasks[index];

taskText.value=task.text;
start.value=task.start;
end.value=task.end;
priority.value=task.priority;
color.value=task.color;

}

}

function closeModal(){

modal.style.display="none";

taskText.value="";
start.selectedIndex=0;
end.selectedIndex=0;
priority.selectedIndex=0;
color.selectedIndex=0;

editIndex=null;

}

function saveTask(){

let task={
text:taskText.value,
start:start.value,
end:end.value,
priority:priority.value,
color:color.value,
date:selectedDate,
done:false
};

if(editIndex!=null){

tasks[editIndex]=task;

}else{

tasks.push(task);

}

save();
closeModal();
render();

}

function toggleDone(i){

tasks[i].done=!tasks[i].done;

save();
render();

}

function deleteTask(i){

tasks.splice(i,1);

save();
render();

}

function duplicateTask(i){

let copy={...tasks[i]};

tasks.push(copy);

save();
render();

}

function renderDay(dateStr){

let cal=document.getElementById("calendar");

let day=document.createElement("div");
day.className="day";

day.onclick=()=>openModal(dateStr);

let d=new Date(dateStr);

let date=document.createElement("div");
date.className="date";
date.innerText=daysHeb[d.getDay()]+" "+d.getDate();

day.appendChild(date);

tasks.forEach((task,i)=>{

if(task.date!==dateStr)return;

let t=document.createElement("div");
t.className="task";
t.style.background=task.color;

if(task.done)t.classList.add("done");

let checkbox=document.createElement("input");
checkbox.type="checkbox";
checkbox.checked=task.done;

checkbox.onclick=(e)=>{
e.stopPropagation();
toggleDone(i);
};

let text=document.createElement("span");
text.innerText=task.start+"-"+task.end+" "+task.text;

text.onclick=(e)=>{
e.stopPropagation();
openModal(task.date,i);
};

let del=document.createElement("button");
del.innerText="🗑";
del.onclick=(e)=>{
e.stopPropagation();
deleteTask(i);
};

let dup=document.createElement("button");
dup.innerText="📑";
dup.onclick=(e)=>{
e.stopPropagation();
duplicateTask(i);
};

t.appendChild(checkbox);
t.appendChild(text);
t.appendChild(del);
t.appendChild(dup);

day.appendChild(t);

});

cal.appendChild(day);

}

function renderToday(){

let today=new Date().toISOString().split("T")[0];

todayTasks.innerHTML="";

tasks.forEach(task=>{

if(task.date===today){

let div=document.createElement("div");
div.innerText=task.start+" "+task.text;

todayTasks.appendChild(div);

}

});

}

function render(){

let cal=document.getElementById("calendar");
cal.innerHTML="";
cal.className="calendar "+view;

let y=current.getFullYear();
let m=current.getMonth();

if(view==="month"){

label.innerText="לוח משימות — "+months[m]+" "+(m+1);

let first=new Date(y,m,1).getDay();
let days=new Date(y,m+1,0).getDate();

for(let i=0;i<first;i++){
cal.appendChild(document.createElement("div"));
}

for(let d=1;d<=days;d++){

let dateStr=y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

renderDay(dateStr);

}

}

renderToday();

}

createTimes();
render();

</script>

</body>
</html>
