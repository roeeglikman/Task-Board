<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח </title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#f2f4f8;
margin:0;
padding:15px;
}

h1{text-align:center;margin-bottom:10px}

.controls{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

button{
padding:6px 10px;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
}

.calendar{
display:grid;
gap:8px;
}

.month{grid-template-columns:repeat(7,1fr)}
.week{grid-template-columns:repeat(7,1fr)}
.day{grid-template-columns:1fr}

.dayBox{
background:white;
border-radius:10px;
padding:6px;
min-height:120px;
}

.todayHighlight{
border:3px solid #4CAF50;
}

.date{
font-weight:bold;
margin-bottom:4px;
font-size:13px;
}

.task{
padding:4px;
margin-top:4px;
border-radius:5px;
font-size:12px;
cursor:grab;
}

.priorityHigh{border-right:4px solid red}
.priorityMed{border-right:4px solid orange}
.priorityLow{border-right:4px solid green}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modalBox{
background:white;
padding:15px;
border-radius:10px;
width:260px;
}

.modalBox input,
.modalBox select{
width:100%;
margin-bottom:6px;
padding:5px;
}

</style>
</head>

<body>

<h1 id="title">לוח משימות</h1>

<div class="controls">
<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>
<button onclick="setView('month')">חודש</button>
<button onclick="setView('week')">שבוע</button>
<button onclick="setView('day')">יום</button>
<button onclick="openModal()">➕ משימה</button>
</div>

<div id="calendar" class="calendar"></div>

<div class="modal" id="modal">
<div class="modalBox">

<input id="text" placeholder="משימה">

<label>שעת התחלה</label>
<select id="start"></select>

<label>שעת סיום</label>
<select id="end"></select>

<label>עדיפות</label>
<select id="priority">
<option value="high">גבוהה</option>
<option value="med">בינונית</option>
<option value="low">נמוכה</option>
</select>

<button onclick="saveTask()">שמור</button>

</div>
</div>

<script>

let tasks=[];

let current=new Date();
let view="month";
let selectedDate=null;

function uid(){
return Math.random().toString(36).substr(2,9);
}

function formatDate(d){
return d.getFullYear()+"-"+(d.getMonth()+1).toString().padStart(2,"0")+"-"+d.getDate().toString().padStart(2,"0");
}

function createTimes(){
for(let h=0;h<24;h++){
for(let m=0;m<60;m+=30){
let t=(h+"").padStart(2,"0")+":"+(m+"").padStart(2,"0");
start.add(new Option(t,t));
end.add(new Option(t,t));
}}
}

function openModal(date=null){

selectedDate=date || formatDate(new Date());

modal.style.display="flex";

}

function saveTask(){

let task={
id:uid(),
text:text.value,
start:start.value,
end:end.value,
priority:priority.value,
date:selectedDate
};

db.collection("tasks").doc(task.id).set(task);

modal.style.display="none";

}

function setView(v){
view=v;
render();
}

function prev(){
current.setMonth(current.getMonth()-1);
render();
}

function next(){
current.setMonth(current.getMonth()+1);
render();
}

function render(){

calendar.innerHTML="";

let today=formatDate(new Date());

let y=current.getFullYear();
let m=current.getMonth();

let daysInMonth=new Date(y,m+1,0).getDate();

for(let d=1;d<=daysInMonth;d++){

let dateStr=formatDate(new Date(y,m,d));

let box=document.createElement("div");
box.className="dayBox";
box.dataset.date=dateStr;

if(dateStr===today)box.classList.add("todayHighlight");

box.onclick=()=>openModal(dateStr);

let header=document.createElement("div");
header.className="date";
header.innerText=d;

box.appendChild(header);

tasks.forEach(t=>{

if(t.date!==dateStr)return;

let task=document.createElement("div");

task.className="task";
task.innerText=t.start+" "+t.text;

task.dataset.id=t.id;

box.appendChild(task);

});

calendar.appendChild(box);

}

enableDrag();

}

</script>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>

<script>

function enableDrag(){

document.querySelectorAll(".dayBox").forEach(box=>{

new Sortable(box,{
group:"tasks",
animation:150,
draggable:".task",

onEnd:function(evt){

let id=evt.item.dataset.id;

let newDate=evt.to.dataset.date;

db.collection("tasks").doc(id).update({
date:newDate
});

}

});

});

}

</script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "AIzaSyBzphmi-yaM3UmxWbJLxVNTMBQgcWJFv_U",
authDomain: "task-board-e7ff1.firebaseapp.com",
projectId: "task-board-e7ff1",
storageBucket: "task-board-e7ff1.firebasestorage.app",
messagingSenderId: "419157316500",
appId: "1:419157316500:web:470bee840a02b3849df581",
measurementId: "G-1PP4QEJY99"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();

db.collection("tasks").onSnapshot((snapshot)=>{

tasks=[];

snapshot.forEach(doc=>{
tasks.push(doc.data());
});

render();

});

createTimes();

</script>

</body>
</html>
