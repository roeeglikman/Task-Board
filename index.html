<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח </title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#f2f4f8;
margin:0;
padding:15px;
}

h1{text-align:center;margin-bottom:10px}

.controls{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

button{
padding:6px 10px;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
}

.calendar{
display:grid;
gap:8px;
}

.month{grid-template-columns:repeat(7,1fr)}
.week{grid-template-columns:repeat(7,1fr)}
.day{grid-template-columns:1fr}

.dayBox{
background:white;
border-radius:10px;
padding:6px;
min-height:120px;
}

.todayHighlight{
border:3px solid #4CAF50;
}

.date{
font-weight:bold;
margin-bottom:4px;
font-size:13px;
}

.task{
padding:4px;
margin-top:4px;
border-radius:5px;
font-size:12px;
cursor:grab;
}

.priorityHigh{border-right:4px solid red}
.priorityMed{border-right:4px solid orange}
.priorityLow{border-right:4px solid green}

</style>
</head>

<body>

<h1 id="title">לוח משימות</h1>

<div class="controls">

<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>

<button onclick="setView('month')">חודש</button>
<button onclick="setView('week')">שבוע</button>
<button onclick="setView('day')">יום</button>

<button onclick="openModal()">➕ משימה</button>

</div>

<div id="calendar" class="calendar"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs, addDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBzphmi-yaM3UmxWbJLxVNTMBQgcWJFv_U",
authDomain: "task-board-e7ff1.firebaseapp.com",
projectId: "task-board-e7ff1",
storageBucket: "task-board-e7ff1.firebasestorage.app",
messagingSenderId: "419157316500",
appId: "1:419157316500:web:470bee840a02b3849df581",
measurementId: "G-1PP4QEJY99"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let tasks=[];
let current=new Date();
let view="month";

async function loadTasks(){

tasks=[];

const snapshot=await getDocs(collection(db,"tasks"));

snapshot.forEach(doc=>{
tasks.push(doc.data());
});

render();

}

async function saveTaskToCloud(task){
await addDoc(collection(db,"tasks"),task);
}

function formatDate(d){
return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();
}

function openModal(){

let text=prompt("שם משימה");

if(!text) return;

let task={
text:text,
date:formatDate(new Date())
};

tasks.push(task);

saveTaskToCloud(task);

render();

}

function setView(v){
view=v;
render();
}

function prev(){
current.setMonth(current.getMonth()-1);
render();
}

function next(){
current.setMonth(current.getMonth()+1);
render();
}

function render(){

calendar.innerHTML="";

let y=current.getFullYear();
let m=current.getMonth();

let days=new Date(y,m+1,0).getDate();

for(let d=1;d<=days;d++){

let date=formatDate(new Date(y,m,d));

let box=document.createElement("div");
box.className="dayBox";

let header=document.createElement("div");
header.innerText=d;

box.appendChild(header);

tasks.forEach(t=>{

if(t.date===date){

let el=document.createElement("div");
el.className="task";
el.innerText=t.text;

box.appendChild(el);

}

});

calendar.appendChild(box);

}

}

loadTasks();

</script>

</body>
</html>
