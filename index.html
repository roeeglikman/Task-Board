<!-- version 2 -->
<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח משימות חודשי</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#f2f4f8;
margin:0;
padding:20px;
}

h1{text-align:center;}

.controls{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

button{
padding:6px 10px;
border:none;
background:#4CAF50;
color:white;
border-radius:5px;
cursor:pointer;
}

.add{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input,select{
padding:6px;
margin:5px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
background:white;
border-radius:10px;
padding:5px;
min-height:120px;
}

.date{
font-weight:bold;
font-size:14px;
}

.task{
background:#eee;
padding:4px;
margin-top:4px;
border-radius:5px;
font-size:12px;
cursor:grab;
}

.high{border-right:5px solid red;}
.medium{border-right:5px solid orange;}
.low{border-right:5px solid green;}

.done{
text-decoration:line-through;
opacity:0.5;
}

.taskButtons{
display:flex;
gap:4px;
margin-top:3px;
}

.taskButtons button{
background:#ddd;
color:black;
padding:2px 5px;
font-size:11px;
}

</style>
</head>

<body>

<h1>📅 לוח משימות חודשי</h1>

<div class="controls">

<button onclick="prevMonth()">⬅</button>
<div id="monthLabel"></div>
<button onclick="nextMonth()">➡</button>

</div>

<div class="add">

<input id="text" placeholder="משימה">

<input type="number" id="dayInput" min="1" max="31" placeholder="יום בחודש">

<select id="time"></select>

<select id="priority">
<option value="high">גבוהה</option>
<option value="medium">בינונית</option>
<option value="low">נמוכה</option>
</select>

<button onclick="addTask()">הוסף</button>

</div>

<div class="calendar" id="calendar"></div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

let current=new Date();

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function createTimes(){

let select=document.getElementById("time");

for(let h=0;h<24;h++){
for(let m=0;m<60;m+=30){

let hh=h.toString().padStart(2,"0");
let mm=m.toString().padStart(2,"0");

let opt=document.createElement("option");
opt.value=hh+":"+mm;
opt.innerText=hh+":"+mm;

select.appendChild(opt);

}
}

}

function addTask(){

let text=document.getElementById("text").value;
let date=document.getElementById("date").value;
let time=document.getElementById("time").value;
let priority=document.getElementById("priority").value;

if(!text || !date)return;

tasks.push({
text,date,time,priority,done:false
});

save();
render();

}

function editTask(i){

let newText=prompt("ערוך משימה",tasks[i].text);

if(newText){

tasks[i].text=newText;

save();
render();

}

}

function duplicateTask(i){

let copy={...tasks[i]};

tasks.push(copy);

save();
render();

}

function render(){

let cal=document.getElementById("calendar");
cal.innerHTML="";

let year=current.getFullYear();
let month=current.getMonth();

document.getElementById("monthLabel").innerText=
current.toLocaleDateString("he-IL",{month:"long",year:"numeric"});

let firstDay=new Date(year,month,1).getDay();
let daysInMonth=new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){

let empty=document.createElement("div");
cal.appendChild(empty);

}

for(let d=1;d<=daysInMonth;d++){

let dateStr=year+"-"+String(month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

let day=document.createElement("div");
day.className="day";

day.ondragover=e=>e.preventDefault();

day.ondrop=e=>{

let id=e.dataTransfer.getData("id");

tasks[id].date=dateStr;

save();
render();

};

let date=document.createElement("div");
date.className="date";
date.innerText=d;

day.appendChild(date);

tasks.forEach((task,i)=>{

if(task.date!==dateStr)return;

let t=document.createElement("div");
t.className="task "+task.priority;

if(task.done)t.classList.add("done");

t.draggable=true;

t.ondragstart=e=>{
e.dataTransfer.setData("id",i);
};

t.innerText=task.time+" "+task.text;

t.onclick=()=>{

tasks[i].done=!tasks[i].done;

save();
render();

};

let btns=document.createElement("div");
btns.className="taskButtons";

let edit=document.createElement("button");
edit.innerText="✏";
edit.onclick=()=>editTask(i);

let dup=document.createElement("button");
dup.innerText="📑";
dup.onclick=()=>duplicateTask(i);

btns.appendChild(edit);
btns.appendChild(dup);

t.appendChild(btns);

day.appendChild(t);

});

cal.appendChild(day);

}

}

function prevMonth(){

current.setMonth(current.getMonth()-1);
render();

}

function nextMonth(){

current.setMonth(current.getMonth()+1);
render();

}

createTimes();
render();

</script>

</body>
</html>
