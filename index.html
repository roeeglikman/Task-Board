<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח משימות</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#f2f4f8;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.add{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input,select,button{
padding:8px;
margin:5px;
}

button{
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.board{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
background:white;
border-radius:10px;
padding:10px;
min-height:200px;
}

.day h3{
margin-top:0;
font-size:16px;
text-align:center;
}

.task{
background:#eee;
padding:6px;
margin-top:5px;
border-radius:5px;
cursor:grab;
}

.high{border-right:6px solid red;}
.medium{border-right:6px solid orange;}
.low{border-right:6px solid green;}

.done{
text-decoration:line-through;
opacity:0.5;
}

</style>
</head>

<body>

<h1>📅 לוח משימות שבועי</h1>

<div class="add">

<input id="text" placeholder="משימה">

<select id="day">
<option value="Sunday">ראשון</option>
<option value="Monday">שני</option>
<option value="Tuesday">שלישי</option>
<option value="Wednesday">רביעי</option>
<option value="Thursday">חמישי</option>
<option value="Friday">שישי</option>
<option value="Saturday">שבת</option>
</select>

<select id="time"></select>

<select id="priority">
<option value="high">גבוהה</option>
<option value="medium">בינונית</option>
<option value="low">נמוכה</option>
</select>

<button onclick="addTask()">הוסף</button>

</div>

<div class="board" id="board"></div>

<script>

const days=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function createTimeOptions(){
let select=document.getElementById("time");

for(let h=0;h<24;h++){
for(let m=0;m<60;m+=30){

let hh=h.toString().padStart(2,"0");
let mm=m.toString().padStart(2,"0");

let opt=document.createElement("option");
opt.value=hh+":"+mm;
opt.innerText=hh+":"+mm;

select.appendChild(opt);

}
}
}

function addTask(){

let text=document.getElementById("text").value;
let day=document.getElementById("day").value;
let time=document.getElementById("time").value;
let priority=document.getElementById("priority").value;

if(!text)return;

tasks.push({
text,
day,
time,
priority,
done:false
});

save();
render();

text.value="";

}

function render(){

let board=document.getElementById("board");
board.innerHTML="";

days.forEach(day=>{

let div=document.createElement("div");
div.className="day";
div.dataset.day=day;

div.ondragover=e=>e.preventDefault();

div.ondrop=e=>{
let id=e.dataTransfer.getData("id");
tasks[id].day=day;
save();
render();
};

let title=document.createElement("h3");
title.innerText=day;

div.appendChild(title);

tasks.forEach((task,i)=>{

if(task.day!==day)return;

let t=document.createElement("div");
t.className="task "+task.priority;

if(task.done) t.classList.add("done");

t.innerText=task.time+" "+task.text;

t.draggable=true;

t.ondragstart=e=>{
e.dataTransfer.setData("id",i);
};

t.onclick=()=>{

tasks[i].done=!tasks[i].done;

save();
render();

};

div.appendChild(t);

});

board.appendChild(div);

});

}

createTimeOptions();
render();

</script>

</body>
</html>
