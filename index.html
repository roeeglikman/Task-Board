<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח משימות</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#f2f4f8;
margin:0;
padding:15px;
}

h1{
text-align:center;
margin-bottom:10px;
}

.controls{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:15px;
}

button{
padding:6px 10px;
border:none;
background:#4CAF50;
color:white;
border-radius:6px;
cursor:pointer;
}

.calendar{
display:grid;
gap:8px;
}

.month{grid-template-columns:repeat(7,1fr);}
.week{grid-template-columns:repeat(7,1fr);}
.day{grid-template-columns:1fr;}

.dayBox{
background:white;
border-radius:10px;
padding:6px;
min-height:120px;
}

.todayHighlight{
border:3px solid #4CAF50;
}

.date{
font-weight:bold;
margin-bottom:4px;
font-size:13px;
}

.task{
display:flex;
align-items:center;
gap:6px;
padding:4px;
margin-top:4px;
border-radius:5px;
font-size:12px;
cursor:pointer;
}

.modal{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.4);
display:none;
align-items:center;
justify-content:center;
}

.modalBox{
background:white;
padding:15px;
border-radius:10px;
width:260px;
}

.modalBox input,
.modalBox select{
width:100%;
margin-bottom:6px;
padding:5px;
}

.today{
position:fixed;
top:10px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
width:200px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
font-size:12px;
}

</style>
</head>

<body>

<h1 id="title">לוח משימות</h1>

<div class="controls">

<button onclick="prev()">⬅</button>
<button onclick="next()">➡</button>

<button onclick="setView('month')">חודש</button>
<button onclick="setView('week')">שבוע</button>
<button onclick="setView('day')">יום</button>

<button onclick="openModal()">➕ משימה</button>

</div>

<div id="calendar" class="calendar"></div>

<div class="today">
<b>משימות להיום</b>
<div id="todayTasks"></div>
</div>

<div class="modal" id="modal">

<div class="modalBox">

<input id="text" placeholder="משימה">

<label>שעת התחלה</label>
<select id="start"></select>

<label>שעת סיום</label>
<select id="end"></select>

<label>צבע</label>
<select id="color">
<option value="#FFCDD2">אדום</option>
<option value="#FFE0B2">כתום</option>
<option value="#FFF9C4">צהוב</option>
<option value="#C8E6C9">ירוק</option>
<option value="#B3E5FC">תכלת</option>
<option value="#D1C4E9">סגול</option>
<option value="#F8BBD0">ורוד</option>
<option value="#E0E0E0">אפור</option>
</select>

<button onclick="saveTask()">שמור</button>
<button onclick="closeModal()">ביטול</button>

</div>

</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

let current=new Date();
let view="month";
let selectedDate=null;

const days=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
const months=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function formatDate(d){
let y=d.getFullYear();
let m=(d.getMonth()+1).toString().padStart(2,"0");
let day=d.getDate().toString().padStart(2,"0");
return y+"-"+m+"-"+day;
}

function createTimes(){
for(let h=0;h<24;h++){
for(let m=0;m<60;m+=30){
let t=(h+"").padStart(2,"0")+":"+(m+"").padStart(2,"0");
start.add(new Option(t,t));
end.add(new Option(t,t));
}}
}

function openModal(date=null){

selectedDate=date || formatDate(new Date());

modal.style.display="flex";

}

function closeModal(){

modal.style.display="none";
text.value="";

}

function saveTask(){

if(!selectedDate)return;

let task={
text:text.value,
start:start.value,
end:end.value,
color:color.value,
date:selectedDate
};

tasks.push(task);

save();
closeModal();
render();

}

function setView(v){
view=v;
render();
}

function prev(){
if(view==="month")current.setMonth(current.getMonth()-1);
if(view==="week")current.setDate(current.getDate()-7);
if(view==="day")current.setDate(current.getDate()-1);
render();
}

function next(){
if(view==="month")current.setMonth(current.getMonth()+1);
if(view==="week")current.setDate(current.getDate()+7);
if(view==="day")current.setDate(current.getDate()+1);
render();
}

function render(){

calendar.innerHTML="";

let today=formatDate(new Date());

if(view==="month"){

calendar.className="calendar month";

let y=current.getFullYear();
let m=current.getMonth();

title.innerText="לוח משימות — "+months[m]+" ("+(m+1)+")";

let first=new Date(y,m,1).getDay();
let daysInMonth=new Date(y,m+1,0).getDate();

for(let i=0;i<first;i++)calendar.appendChild(document.createElement("div"));

for(let d=1;d<=daysInMonth;d++){

let date=new Date(y,m,d);

renderDay(date,today);

}

}

if(view==="week"){

calendar.className="calendar week";

let start=new Date(current);
start.setDate(current.getDate()-current.getDay());

let end=new Date(start);
end.setDate(start.getDate()+6);

title.innerText="שבוע "+getWeekNumber(current)+" | "+start.getDate()+"-"+end.getDate()+" "+months[start.getMonth()];

for(let i=0;i<7;i++){

let d=new Date(start);
d.setDate(start.getDate()+i);

renderDay(d,today);

}

}

if(view==="day"){

calendar.className="calendar day";

title.innerText=days[current.getDay()]+" "+current.getDate()+" "+months[current.getMonth()];

renderDay(current,today);

}

renderToday();

}

function renderDay(date,today){

let dateStr=formatDate(date);

let box=document.createElement("div");
box.className="dayBox";

if(dateStr===today)box.classList.add("todayHighlight");

box.onclick=()=>openModal(dateStr);

let header=document.createElement("div");
header.className="date";
header.innerText=days[date.getDay()]+" "+date.getDate();

box.appendChild(header);

tasks.forEach(t=>{

if(t.date!==dateStr)return;

let task=document.createElement("div");
task.className="task";
task.style.background=t.color;
task.innerText=t.start+" "+t.text;

box.appendChild(task);

});

calendar.appendChild(box);

}

function renderToday(){

let today=formatDate(new Date());

todayTasks.innerHTML="";

tasks.forEach(t=>{
if(t.date===today){

let d=document.createElement("div");
d.innerText=t.start+" "+t.text;

todayTasks.appendChild(d);

}
});

}

function getWeekNumber(d){
let first=new Date(d.getFullYear(),0,1);
return Math.ceil((((d-first)/86400000)+first.getDay()+1)/7);
}

createTimes();
render();

</script>
</body>
</html>
