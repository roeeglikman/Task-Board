<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לוח משימות</title>

<style>

body{
font-family:Arial;
direction:rtl;
background:#f2f4f8;
margin:0;
padding:15px;
}

h1{text-align:center}

.controls{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:8px;
margin-bottom:15px;
}

button{
padding:6px 10px;
border:none;
background:#4CAF50;
color:white;
border-radius:5px;
cursor:pointer;
}

.calendar{
display:grid;
gap:8px;
}

.month{
grid-template-columns:repeat(7,1fr);
}

.week{
grid-template-columns:repeat(7,1fr);
}

.dayView{
grid-template-columns:1fr;
}

.day{
background:white;
border-radius:10px;
padding:6px;
min-height:110px;
}

.date{
font-weight:bold;
margin-bottom:4px;
}

.task{
padding:4px;
margin-top:4px;
border-radius:5px;
font-size:12px;
cursor:grab;
background:#eee;
}

.done{
text-decoration:line-through;
opacity:0.5;
}

.taskBtns{
display:flex;
gap:3px;
margin-top:2px;
}

.taskBtns button{
background:#ddd;
color:black;
padding:2px 4px;
font-size:10px;
}

</style>

</head>

<body>

<h1>📅 לוח משימות</h1>

<div class="controls">

<button onclick="prev()">⬅</button>
<div id="label"></div>
<button onclick="next()">➡</button>

<button onclick="setView('month')">חודש</button>
<button onclick="setView('week')">שבוע</button>
<button onclick="setView('day')">יום</button>

<select id="time"></select>

<select id="priority">
<option>גבוהה</option>
<option>בינונית</option>
<option>נמוכה</option>
</select>

<input type="color" id="color" value="#eeeeee">

<button onclick="addTaskManual()">➕ משימה</button>

</div>

<div id="calendar" class="calendar"></div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[];

let current=new Date();
let view="month";

function save(){
localStorage.setItem("tasks",JSON.stringify(tasks));
}

function createTimes(){

let select=document.getElementById("time");

for(let h=0;h<24;h++){
for(let m=0;m<60;m+=30){

let hh=h.toString().padStart(2,"0");
let mm=m.toString().padStart(2,"0");

let opt=document.createElement("option");
opt.value=hh+":"+mm;
opt.innerText=hh+":"+mm;

select.appendChild(opt);

}
}

}

function setView(v){

view=v;
render();

}

function prev(){

if(view==="month") current.setMonth(current.getMonth()-1);
if(view==="week") current.setDate(current.getDate()-7);
if(view==="day") current.setDate(current.getDate()-1);

render();

}

function next(){

if(view==="month") current.setMonth(current.getMonth()+1);
if(view==="week") current.setDate(current.getDate()+7);
if(view==="day") current.setDate(current.getDate()+1);

render();

}

function addTask(date){

let text=prompt("משימה");

if(!text)return;

let time=document.getElementById("time").value;
let color=document.getElementById("color").value;

tasks.push({text,date,time,color,done:false});

save();
render();

}

function addTaskManual(){

let d=prompt("יום בחודש");

if(!d)return;

let y=current.getFullYear();
let m=current.getMonth()+1;

let date=y+"-"+String(m).padStart(2,"0")+"-"+String(d).padStart(2,"0");

addTask(date);

}

function deleteTask(i){

tasks.splice(i,1);

save();
render();

}

function editTask(i){

let t=prompt("ערוך משימה",tasks[i].text);

if(t){
tasks[i].text=t;
save();
render();
}

}

function renderDay(dateStr){

let cal=document.getElementById("calendar");

let day=document.createElement("div");
day.className="day";

day.onclick=()=>addTask(dateStr);

let date=document.createElement("div");
date.className="date";
date.innerText=dateStr;

day.appendChild(date);

tasks.forEach((task,i)=>{

if(task.date!==dateStr)return;

let t=document.createElement("div");

t.className="task";

t.style.background=task.color;

if(task.done)t.classList.add("done");

t.innerText=task.time+" "+task.text;

t.onclick=(e)=>{
e.stopPropagation();
tasks[i].done=!tasks[i].done;
save();
render();
};

let btns=document.createElement("div");
btns.className="taskBtns";

let edit=document.createElement("button");
edit.innerText="✏";
edit.onclick=(e)=>{e.stopPropagation();editTask(i);};

let del=document.createElement("button");
del.innerText="🗑";
del.onclick=(e)=>{e.stopPropagation();deleteTask(i);};

btns.appendChild(edit);
btns.appendChild(del);

t.appendChild(btns);

day.appendChild(t);

});

cal.appendChild(day);

}

function render(){

let cal=document.getElementById("calendar");

cal.innerHTML="";
cal.className="calendar "+view;

let y=current.getFullYear();
let m=current.getMonth();

if(view==="month"){

document.getElementById("label").innerText=
current.toLocaleDateString("he-IL",{month:"long",year:"numeric"});

let first=new Date(y,m,1).getDay();
let days=new Date(y,m+1,0).getDate();

for(let i=0;i<first;i++){
cal.appendChild(document.createElement("div"));
}

for(let d=1;d<=days;d++){

let dateStr=y+"-"+String(m+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");

renderDay(dateStr);

}

}

if(view==="week"){

let start=new Date(current);
start.setDate(current.getDate()-current.getDay());

document.getElementById("label").innerText="שבוע";

for(let i=0;i<7;i++){

let d=new Date(start);

d.setDate(start.getDate()+i);

let dateStr=d.toISOString().split("T")[0];

renderDay(dateStr);

}

}

if(view==="day"){

let dateStr=current.toISOString().split("T")[0];

document.getElementById("label").innerText="יום";

renderDay(dateStr);

}

}

createTimes();
render();

</script>

</body>
</html>
